services:
  postgres:
    image: postgres:16
    container_name: bb-postgres
    environment:
      POSTGRES_DB: budgetbasket
      POSTGRES_USER: budgetbasket
      POSTGRES_PASSWORD: budgetbasket
    ports:
      - "5433:5432"
    volumes:
      - budgetbasket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetbasket -d budgetbasket"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: bb-seaweedfs
    command: >
      server
      -dir=/data
      -s3
      -s3.port=8333
      -filer
      -filer.port=8888
      -master.port=9333
      -volume.port=8080
    ports:
      - "8333:8333"
      - "8888:8888"
      - "9333:9333"
    volumes:
      - budgetbasket_seaweedfs_data:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bb-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@budgetbasket.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    container_name: bb-backend
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: development
      APP_PORT: "8000"
      DATABASE_URL: postgresql://budgetbasket:budgetbasket@postgres:5432/budgetbasket
      POSTGRES_DB: budgetbasket
      POSTGRES_USER: budgetbasket
      POSTGRES_PASSWORD: budgetbasket
      S3_ENDPOINT: http://seaweedfs:8333
      S3_REGION: us-east-1
      S3_ACCESS_KEY: budgetbasket
      S3_SECRET_KEY: budgetbasket_secret
      S3_BUCKET: budgetbasket-files
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: http://localhost:8333
      MAX_UPLOAD_FILE_SIZE_MB: "25"
      ALLOWED_UPLOAD_MIME_TYPES: application/pdf,image/png,image/jpeg,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.wordprocessingml.document
      BUDGET_EXPORT_DIR: /tmp/budgetbasket/exports
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: bb-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  budgetbasket_postgres_data:
  budgetbasket_seaweedfs_data:
